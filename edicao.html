<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edição de Remessas - SistemaTaloes</title>
  <style>
    :root {
      --bg:#f4f4f4; --ink:#333; --ink-2:#555; --card:#fff; --muted:#777;
      --pri:#007bff; --pri-700:#0056b3; --danger:#dc3545; --danger-700:#c82333;
      --ok:#198754; --warn:#ffc107; --bd:#ddd; --chip:#f7f7f7;
    }
    * { box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--ink);
    }
    header {
      background: #333;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,.2);
    }
    header h1 { margin: 0; font-size: 22px; }
    .user-info { font-size: 13px; text-align: right; }
    .user-info span { display: block; font-weight: 700; }
    nav {
      background-color: #555;
      padding: 10px 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,.1);
      font-size: .8em;
    }
    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      display: block;
    }
    nav a:hover { background: #777; }
    .nav-collapsed { display: none; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    #menuToggleButton, #logoutButton {
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    #menuToggleButton { background: #6c757d; }
    #menuToggleButton:hover { background: #5a6268; }
    #logoutButton { background: var(--danger); }
    #logoutButton:hover { background: var(--danger-700); }

    .main-content {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .search-card, .result-card {
      background: var(--card);
      width: 100%;
      max-width: 1150px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,.08);
      padding: 18px;
    }
    .search-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      align-items: end;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .form-group label {
      font-weight: 700;
      color: var(--ink-2);
      font-size: .9em;
    }
    .form-group input, .form-group select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: .95em;
      width: 100%;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: .95em;
      transition: background .2s;
    }
    .btn-primary { background: var(--pri); color: #fff; }
    .btn-primary:hover { background: var(--pri-700); }
    .btn-secondary { background: #e9ecef; color: #222; }
    .btn-secondary:hover { background: #dde2e6; }
    .btn-success { background: var(--ok); color: #fff; }
    .btn-success:hover { filter: brightness(.95); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    .page-title {
      margin: 0 0 6px 0;
      font-size: 1.35rem;
    }
    .page-subtitle {
      margin: 0 0 16px 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .message {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      font-size: .95em;
      display: none;
    }
    .message.show { display: block; }
    .message.info { background: #d1ecf1; color: #0c5460; }
    .message.success { background: #d4edda; color: #155724; }
    .message.error { background: #f8d7da; color: #721c24; }

    .summary-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .summary-item {
      background: var(--chip);
      border: 1px solid var(--bd);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: center;
    }
    .summary-item strong {
      display: block;
      font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .edit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .table-wrap {
      width: 100%;
      overflow: auto;
      border: 1px solid var(--bd);
      border-radius: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .86em;
      background: #fff;
    }
    th, td {
      border: 1px solid var(--bd);
      padding: 8px 10px;
      text-align: center;
      white-space: nowrap;
    }
    thead th {
      background: #f2f2f2;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tbody tr:nth-child(even) { background: #fafafa; }
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: .84em;
      border: 1px solid #d8d8d8;
      background: #fff;
    }
    .hidden { display: none !important; }

    @media (max-width: 768px) {
      .main-content { padding: 12px; }
      .search-card, .result-card { padding: 14px; }
      header h1 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>SistemaTaloes</h1>
    <div class="user-info">
      <span id="userNameDisplay">Carregando...</span>
      <span id="userNivelDisplay"></span>
    </div>
    <div class="header-actions">
      <button id="menuToggleButton">Menu</button>
      <button id="logoutButton">Sair</button>
    </div>
  </header>

  <nav id="mainNav" class="nav-collapsed">
    <ul id="menuNav"></ul>
  </nav>

  <div class="main-content">
    <section class="search-card">
      <h2 class="page-title">Edição de Remessas</h2>
      <p class="page-subtitle">Busque uma remessa para alterar Data de Corte, Data de Entrega e Tipo de Cliente em todos os talões da remessa.</p>

      <div class="search-grid">
        <div class="form-group">
          <label for="filterRemessa">Número da Remessa</label>
          <input type="text" id="filterRemessa" placeholder="Ex: 2772513" />
        </div>
        <div class="form-group">
          <label for="filterLinha">Linha (opcional)</label>
          <input type="text" id="filterLinha" placeholder="Ex: 7142" />
        </div>
        <div class="form-group">
          <label for="filterTipoCliente">Tipo de Cliente (opcional)</label>
          <select id="filterTipoCliente">
            <option value="">Todos</option>
            <option value="Exportacao">Exportação</option>
            <option value="Cliente especial">Cliente Especial</option>
            <option value="Mercado Interno">Mercado Interno</option>
            <option value="Estoque">Estoque</option>
            <option value="Amostra">Amostra</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="searchButton">Buscar remessa</button>
        <button class="btn btn-secondary" id="clearButton">Limpar</button>
      </div>

      <div id="messageBox" class="message"></div>
    </section>

    <section id="resultCard" class="result-card hidden">
      <div class="summary-bar" id="summaryBar"></div>

      <div class="edit-grid">
        <div class="form-group">
          <label for="editDataCorte">Nova Data de Corte</label>
          <input type="date" id="editDataCorte" />
        </div>
        <div class="form-group">
          <label for="editDataEntrega">Nova Data de Entrega</label>
          <input type="date" id="editDataEntrega" />
        </div>
        <div class="form-group">
          <label for="editTipoCliente">Novo Tipo de Cliente</label>
          <select id="editTipoCliente">
            <option value="">Selecione</option>
            <option value="Exportacao">Exportação</option>
            <option value="Cliente especial">Cliente Especial</option>
            <option value="Mercado Interno">Mercado Interno</option>
            <option value="Estoque">Estoque</option>
            <option value="Amostra">Amostra</option>
          </select>
        </div>
      </div>

      <div class="actions" style="margin-top:0; margin-bottom:16px;">
        <button class="btn btn-success" id="saveButton">Salvar alterações na remessa</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Remessa</th>
              <th>Talão</th>
              <th>Linha</th>
              <th>Modelo</th>
              <th>Pares</th>
              <th>Cor</th>
              <th>Data Corte</th>
              <th>Data Entrega</th>
              <th>Tipo Cliente</th>
            </tr>
          </thead>
          <tbody id="resultTableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyCLb8BeZODM8vMynaIXINx4AN_P8snTBk8",
      authDomain: "sistemataloes.firebaseapp.com",
      projectId: "sistemataloes",
      storageBucket: "sistemataloes.appspot.com",
      messagingSenderId: "684534379685",
      appId: "1:684534379685:web:..."
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const nivelNomes = {
      '01': 'Cadastro', '02': 'Corte', '03': 'Costura', '04': 'Montagem',
      '05': 'Admin', '06': 'Consultor', '07': 'Super'
    };

    const pages = [
      { name: 'Index', href: 'index.html', levels: ['01','02','03','04','05','06','07'] },
      { name: 'Cadastro Usuarios', href: 'cadastroUsuarios.html', levels: ['07'] },
      { name: 'Cadastro Talões', href: 'cadastroTaloes.html', levels: ['01','05','07'] },
      { name: 'Cadastro Manual', href: 'cadastromanual.html', levels: ['05','07'] },
      { name: 'Romaneio', href: 'romaneio.html', levels: ['05','07'] },
      { name: 'Excluir Dados', href: 'excluirDados.html', levels: ['05','07'] },
      { name: 'Registro em Massa', href: 'registroEmMassa.html', levels: ['05','07'] },
      { name: 'Corte', href: 'corte.html', levels: ['02','07'] },
      { name: 'Relatório Erros', href: 'relatorioerros.html', levels: ['02','04','07'] },
      { name: 'Resumo', href: 'resumo.html', levels: ['04','06','07'] },
      { name: 'Cronograma', href: 'cronograma.html', levels: ['01','02','04','05','06','07'] },
      { name: 'Cronograma Mobile', href: 'cronogramamobile.html', levels: ['06','07'] },
      { name: 'Relatório Master', href: 'relatorioMaster.html', levels: ['05','07'] },
      { name: 'Costura', href: 'costura.html', levels: ['03','07'] },
      { name: 'Relatorio Atelier', href: 'relatorioAtelier.html', levels: ['03','07'] },
      { name: 'Atlier Celular', href: 'relatoriomobile.html', levels: ['03','07'] },
      { name: 'Distribuição', href: 'distribuicao.html', levels: ['04','07'] },
      { name: 'Talonagem', href: 'talonagem.html', levels: ['04','07'] },
      { name: 'Montagem', href: 'montagem.html', levels: ['05','07'] },
      { name: 'Edição de Remessas', href: 'edicao.html', levels: ['05','07'] }
    ];

    const corTalaoMapping = {
      'Exportacao': 'Azul',
      'Cliente especial': 'Rosa',
      'Mercado Interno': 'Branco',
      'Estoque': 'Amarelo',
      'Amostra': 'Verde'
    };

    const menuNav = document.getElementById('menuNav');
    const mainNav = document.getElementById('mainNav');
    const menuToggleButton = document.getElementById('menuToggleButton');
    const userNameDisplay = document.getElementById('userNameDisplay');
    const userNivelDisplay = document.getElementById('userNivelDisplay');
    const logoutButton = document.getElementById('logoutButton');

    const filterRemessa = document.getElementById('filterRemessa');
    const filterLinha = document.getElementById('filterLinha');
    const filterTipoCliente = document.getElementById('filterTipoCliente');
    const searchButton = document.getElementById('searchButton');
    const clearButton = document.getElementById('clearButton');
    const saveButton = document.getElementById('saveButton');
    const messageBox = document.getElementById('messageBox');
    const resultCard = document.getElementById('resultCard');
    const summaryBar = document.getElementById('summaryBar');
    const resultTableBody = document.getElementById('resultTableBody');
    const editDataCorte = document.getElementById('editDataCorte');
    const editDataEntrega = document.getElementById('editDataEntrega');
    const editTipoCliente = document.getElementById('editTipoCliente');

    let currentDocs = [];

    function generateMenu(userLevel, userName) {
      menuNav.innerHTML = '';
      const userNivelText = nivelNomes[userLevel] || `Nível ${userLevel}`;
      userNameDisplay.textContent = `Olá, ${userName || 'Usuário'}!`;
      userNivelDisplay.textContent = `Setor: ${userNivelText}`;

      pages.forEach(page => {
        if (page.levels.includes(userLevel)) {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = page.href;
          a.textContent = page.name;
          li.appendChild(a);
          menuNav.appendChild(li);
        }
      });
    }

    function showMessage(text, type = 'info') {
      messageBox.textContent = text;
      messageBox.className = `message show ${type}`;
    }

    function clearMessage() {
      messageBox.textContent = '';
      messageBox.className = 'message';
    }

    function formatDate(iso) {
      if (!iso) return '';
      const [y, m, d] = String(iso).split('-');
      if (!y || !m || !d) return iso;
      return `${d}/${m}/${y}`;
    }

    function fillEditFieldsFromCurrent() {
      if (!currentDocs.length) return;
      const first = currentDocs[0].data;
      editDataCorte.value = first.dataCorte || '';
      editDataEntrega.value = first.dataEntrega || '';
      editTipoCliente.value = first.tipoCliente || '';
    }

    function renderSummaryAndTable() {
      if (!currentDocs.length) {
        resultCard.classList.add('hidden');
        return;
      }

      const paresTotal = currentDocs.reduce((sum, item) => sum + (Number(item.data.pares) || 0), 0);
      const remessa = currentDocs[0].data.numeroRemessa || '-';
      const linhas = [...new Set(currentDocs.map(item => item.data.linha).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b), undefined, { numeric: true }));
      const tipos = [...new Set(currentDocs.map(item => item.data.tipoCliente).filter(Boolean))];

      summaryBar.innerHTML = `
        <div class="summary-item"><strong>${remessa}</strong>Remessa</div>
        <div class="summary-item"><strong>${currentDocs.length}</strong>Talões</div>
        <div class="summary-item"><strong>${paresTotal}</strong>Pares</div>
        <div class="summary-item"><strong>${linhas.join(', ') || '-'}</strong>Linha(s)</div>
        <div class="summary-item"><strong>${tipos.join(', ') || '-'}</strong>Tipo(s)</div>
      `;

      const ordered = [...currentDocs].sort((a, b) => {
        const talaoA = parseInt(a.data.numeroTalaoSequencial || 0, 10);
        const talaoB = parseInt(b.data.numeroTalaoSequencial || 0, 10);
        return talaoA - talaoB;
      });

      resultTableBody.innerHTML = '';
      ordered.forEach(item => {
        const t = item.data;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${t.numeroRemessa || ''}</td>
          <td>${t.numeroTalaoSequencial || ''}</td>
          <td>${t.linha || ''}</td>
          <td>${t.modelo || ''}</td>
          <td>${Number(t.pares) || 0}</td>
          <td>${t.corSapato || ''}</td>
          <td>${formatDate(t.dataCorte)}</td>
          <td>${formatDate(t.dataEntrega)}</td>
          <td><span class="tag">${t.tipoCliente || ''}</span></td>
        `;
        resultTableBody.appendChild(tr);
      });

      fillEditFieldsFromCurrent();
      resultCard.classList.remove('hidden');
    }

    async function searchRemessa() {
      clearMessage();
      resultCard.classList.add('hidden');
      resultTableBody.innerHTML = '';
      summaryBar.innerHTML = '';
      currentDocs = [];

      const remessa = filterRemessa.value.trim();
      const linha = filterLinha.value.trim();
      const tipo = filterTipoCliente.value;

      if (!remessa) {
        showMessage('Informe o número da remessa para buscar.', 'error');
        return;
      }

      try {
        showMessage('Buscando remessa...', 'info');
        let qRef = query(collection(db, 'taloes'), where('numeroRemessa', '==', remessa));
        const snap = await getDocs(qRef);

        let docs = snap.docs.map(docSnap => ({ id: docSnap.id, ref: docSnap.ref, data: docSnap.data() }));

        if (linha) docs = docs.filter(item => String(item.data.linha || '') === linha);
        if (tipo) docs = docs.filter(item => String(item.data.tipoCliente || '') === tipo);

        if (!docs.length) {
          showMessage('Nenhum talão encontrado para os filtros informados.', 'error');
          return;
        }

        currentDocs = docs;
        renderSummaryAndTable();
        showMessage(`Remessa ${remessa} carregada com ${docs.length} talão(ões).`, 'success');
      } catch (error) {
        console.error(error);
        showMessage('Erro ao buscar a remessa. Verifique o console.', 'error');
      }
    }

    async function saveChanges() {
      clearMessage();

      if (!currentDocs.length) {
        showMessage('Busque uma remessa antes de salvar.', 'error');
        return;
      }

      const newDataCorte = editDataCorte.value;
      const newDataEntrega = editDataEntrega.value;
      const newTipoCliente = editTipoCliente.value;

      if (!newDataCorte || !newDataEntrega || !newTipoCliente) {
        showMessage('Preencha Data de Corte, Data de Entrega e Tipo de Cliente.', 'error');
        return;
      }

      const corTalao = corTalaoMapping[newTipoCliente];
      if (!corTalao) {
        showMessage('Tipo de cliente inválido para mapear a cor do talão.', 'error');
        return;
      }

      try {
        saveButton.disabled = true;
        showMessage('Salvando alterações na remessa...', 'info');

        const batch = writeBatch(db);
        currentDocs.forEach(item => {
          batch.update(item.ref, {
            dataCorte: newDataCorte,
            dataEntrega: newDataEntrega,
            tipoCliente: newTipoCliente,
            corTalao: corTalao
          });
        });
        await batch.commit();

        currentDocs = currentDocs.map(item => ({
          ...item,
          data: {
            ...item.data,
            dataCorte: newDataCorte,
            dataEntrega: newDataEntrega,
            tipoCliente: newTipoCliente,
            corTalao: corTalao
          }
        }));

        renderSummaryAndTable();
        showMessage(`Alterações salvas com sucesso em ${currentDocs.length} talão(ões) da remessa ${currentDocs[0].data.numeroRemessa}.`, 'success');
      } catch (error) {
        console.error(error);
        showMessage('Erro ao salvar as alterações da remessa.', 'error');
      } finally {
        saveButton.disabled = false;
      }
    }

    function clearForm() {
      filterRemessa.value = '';
      filterLinha.value = '';
      filterTipoCliente.value = '';
      editDataCorte.value = '';
      editDataEntrega.value = '';
      editTipoCliente.value = '';
      currentDocs = [];
      resultCard.classList.add('hidden');
      resultTableBody.innerHTML = '';
      summaryBar.innerHTML = '';
      clearMessage();
    }

    searchButton.addEventListener('click', searchRemessa);
    clearButton.addEventListener('click', clearForm);
    saveButton.addEventListener('click', saveChanges);
    filterRemessa.addEventListener('keydown', e => { if (e.key === 'Enter') searchRemessa(); });
    menuToggleButton.addEventListener('click', () => mainNav.classList.toggle('nav-collapsed'));
    logoutButton.addEventListener('click', async () => {
      try {
        await signOut(auth);
        window.location.href = 'login.html';
      } catch (error) {
        console.error(error);
        alert('Erro ao fazer logout. Tente novamente.');
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const userSnap = await getDoc(doc(db, 'Usuario', user.email));
      if (!userSnap.exists()) {
        alert('Dados do usuário não encontrados. Faça login novamente.');
        await signOut(auth);
        window.location.href = 'login.html';
        return;
      }

      const { nivelAcesso, Nome } = userSnap.data();
      if (!pages.find(p => p.href === 'edicao.html' && p.levels.includes(nivelAcesso))) {
        alert('Você não tem permissão para acessar esta página.');
        window.location.href = 'index.html';
        return;
      }

      generateMenu(nivelAcesso, Nome);
    });
  </script>
</body>
</html>
