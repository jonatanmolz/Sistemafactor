<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Distribuição PDF - SistemaTaloes</title>
  <style>
    :root{--bg:#f4f4f4;--ink:#333;--ink2:#555;--card:#fff;--muted:#777;--pri:#007bff;--pri700:#0056b3;--ok:#198754;--warn:#ffc107;--danger:#dc3545;--bd:#ddd;--chip:#f0f0f0}
    *{box-sizing:border-box} body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);margin:0;min-height:100vh;color:var(--ink)}
    .main-content{padding:16px;display:flex;flex-direction:column;align-items:center;gap:14px}
    .panel{background:var(--card);border-radius:12px;box-shadow:0 4px 14px rgba(0,0,0,.08);width:100%;max-width:1280px;padding:14px}
    .filters-container{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;justify-content:flex-start}
    .form-group{display:flex;flex-direction:column;gap:4px;min-width:150px}.form-group label{font-weight:700;color:var(--ink2);font-size:.82em}
    input,select{padding:9px;border:1px solid #ccc;border-radius:8px;font-size:.92em;background:#fff}
    input[type=file]{min-width:300px}.btn{padding:10px 14px;border:0;border-radius:8px;cursor:pointer;font-weight:700;display:inline-flex;gap:6px;align-items:center;justify-content:center}
    .btn-primary{background:var(--pri);color:#fff}.btn-primary:hover{background:var(--pri700)}.btn-secondary{background:#e9ecef;color:#111}.btn-secondary:hover{background:#dde2e6}.btn-ok{background:var(--ok);color:#fff}.btn-danger{background:var(--danger);color:#fff}
    .hint{color:var(--muted);font-size:.86em;line-height:1.35;margin:8px 0 0}.status{padding:9px 10px;border-radius:8px;background:#eef4ff;color:#27456f;font-weight:700;display:none}
    .summary{display:flex;gap:8px;flex-wrap:wrap}.summary .card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:10px 12px;min-width:140px;text-align:center}.summary strong{display:block;font-size:1.25em;color:#111}.summary span{font-size:.82em;color:var(--muted);font-weight:700}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}.toolbar-left,.toolbar-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .excel-wrap{width:100%;overflow:auto;border:1px solid #bbb;background:#fff}
    .excel-cards{display:grid;grid-template-columns:repeat(3,minmax(260px,1fr));gap:14px;align-items:start}
    .dist-card{background:#fff;border:1px solid #cfcfcf;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden}
    .dist-card-head{background:#f3f3f3;border-bottom:1px solid #cfcfcf;padding:10px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .dist-card-head h3{margin:0;font-size:1em}.dist-card-head small{color:var(--muted);font-weight:700}.dist-card-body{overflow:auto;padding:8px}
    .copy-card-btn{padding:7px 10px;border:0;border-radius:7px;background:var(--ok);color:#fff;font-weight:700;cursor:pointer}.copy-card-btn:hover{filter:brightness(.94)}
    .excel-table{border-collapse:collapse;font-size:.82em;width:100%;min-width:260px}.excel-table th,.excel-table td{border:1px solid #999;padding:4px 7px;text-align:center;white-space:nowrap;height:24px}.excel-table th{background:#ddd;font-weight:800}.excel-table .date-title{font-size:1.2em;background:#d9d9d9}.excel-table .line-title{background:#f6f6f6;font-weight:800}.excel-table .total-row td{background:#d9d9d9;font-weight:800}.excel-table .gap{border:0;background:#fff;min-width:12px}.excel-table input{border:0;padding:2px 4px;width:78px;text-align:center;background:transparent}.excel-table input:focus{outline:2px solid var(--pri);background:#fff}
    .raw-table{width:100%;border-collapse:collapse;font-size:.78em}.raw-table th,.raw-table td{border:1px solid var(--bd);padding:5px;text-align:center;white-space:nowrap}.raw-table th{background:#f2f2f2}.raw-table tr:nth-child(even){background:#fafafa}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{background:#e9ecef;border:0;border-radius:8px;padding:9px 12px;cursor:pointer;font-weight:700}.tab.active{background:var(--pri);color:#fff}.view{display:none}.view.active{display:block}
    .debug{font-family:Consolas,monospace;font-size:.78em;white-space:pre-wrap;background:#111;color:#eee;border-radius:8px;padding:10px;max-height:260px;overflow:auto}
    #sistemaMenuDrawer .sistema-menu-lista{max-height:none!important;height:calc(100vh - 54px)!important;overflow-y:auto!important;display:block!important;padding:8px 8px 16px!important;background:transparent!important;box-shadow:none!important;font-size:inherit!important;transition:none!important}
    #sistemaMenuDrawer .sistema-menu-link{display:flex!important;align-items:center!important;min-height:34px!important;padding:0 12px 0 20px!important;border-radius:8px!important;color:#f4f7fb!important;text-decoration:none!important;font-size:13px!important;font-weight:500!important;margin:1px 0!important;position:relative!important;white-space:normal!important}
    @media(max-width:1100px){.excel-cards{grid-template-columns:repeat(2,minmax(260px,1fr))}}
    @media(max-width:760px){.main-content{padding:8px}.panel{padding:10px}.form-group,input[type=file]{min-width:100%;width:100%}.btn{flex:1}.toolbar{align-items:stretch}.toolbar-left,.toolbar-right{width:100%}.summary .card{flex:1 1 calc(50% - 8px)}.excel-cards{grid-template-columns:1fr}.excel-table{font-size:.72em}}
  </style>
  <script src="navegacao.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
</head>
<body>
  <div class="main-content">
    <section class="panel">
      <div class="filters-container">
        <div class="form-group" style="min-width:330px"><label for="pdfFile">PDF Beira Rio / Cronograma de Produção</label><input type="file" id="pdfFile" accept="application/pdf" /></div>
        <div class="form-group" style="min-width:330px"><label for="excelFile">Excel modelo da programação</label><input type="file" id="excelFile" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" /></div>
        <div class="form-group"><label for="filterLinha">Filtrar linha</label><input id="filterLinha" placeholder="Ex: 4134" /></div>
        <div class="form-group"><label for="filterData">Filtrar corte</label><input id="filterData" placeholder="Ex: 06/07" /></div>
        <button class="btn btn-primary" id="processBtn">Ler PDF</button>
        <button class="btn btn-secondary" id="clearBtn">Limpar</button>
      </div>
      <p class="hint">A página lê o PDF, identifica <b>Linha</b>, <b>data de corte</b> e os <b>modelos no cabeçalho da direita</b>. Depois você anexa o Excel modelo e clica em <b>Gerar Excel ajustado</b>. A página altera somente data de corte, linha, modelo e pares, mantendo fórmulas e campos do arquivo.</p>
      <div class="status" id="statusBox"></div>
    </section>

    <section class="panel" id="resultPanel" style="display:none">
      <div class="toolbar">
        <div class="toolbar-left"><h2 style="margin:0">Distribuição por Linha / Modelo</h2></div>
        <div class="toolbar-right">
          <button class="btn btn-ok" id="generateExcelBtn">Gerar Excel ajustado</button>
          <button class="btn btn-ok" id="copyExcelBtn">Copiar para Excel</button>
          <button class="btn btn-secondary" id="downloadCsvBtn">Baixar CSV</button>
        </div>
      </div>
      <div class="summary" id="summaryCards" style="margin:12px 0"></div>
      <div class="tabs"><button class="tab active" data-view="viewExcel">Tabela Excel</button><button class="tab" data-view="viewRaw">Conferência</button><button class="tab" data-view="viewDebug">Diagnóstico</button></div>
      <div id="viewExcel" class="view active" style="margin-top:10px"><div class="excel-cards" id="excelTable"></div></div>
      <div id="viewRaw" class="view" style="margin-top:10px"><div class="excel-wrap"><table class="raw-table" id="rawTable"></table></div></div>
      <div id="viewDebug" class="view" style="margin-top:10px"><div class="debug" id="debugBox"></div></div>
    </section>
  </div>

<script>
(function(){
  'use strict';
  if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const $ = id => document.getElementById(id);
  const pdfFile = $('pdfFile'), excelFile = $('excelFile'), processBtn = $('processBtn'), clearBtn = $('clearBtn'), statusBox = $('statusBox');
  const resultPanel = $('resultPanel'), summaryCards = $('summaryCards'), excelTable = $('excelTable'), rawTable = $('rawTable'), debugBox = $('debugBox');
  let aggregated = [], rawRows = [], debugLines = [], detectedYear = null;

  function initMenu(){
    const userLevel = localStorage.getItem('userNivelAcesso') || '07';
    const userName = localStorage.getItem('userName') || 'Usuário';
    if (window.SistemaNavegacao && window.SistemaNavegacao.init) {
      window.SistemaNavegacao.init({ userLevel, userName, title:'Controle de produção FactorShoes', onLogout: () => { localStorage.clear(); window.location.href = 'login.html'; } });
    }
  }
  document.addEventListener('DOMContentLoaded', initMenu);

  function setStatus(msg, show=true){ statusBox.textContent = msg; statusBox.style.display = show ? 'block' : 'none'; }
  function parseNumber(v){ if(v==null) return 0; const s=String(v).trim().replace(/\s/g,''); if(!s) return 0; return Number(s.replace(/[.,]/g,'')) || 0; }
  function fmt(n){ return Number(n||0).toLocaleString('pt-BR'); }
  function isDate(s){ return /^\d{2}\/\d{2}$/.test(String(s||'').trim()); }
  function isLine(s){ return /^\d{4}$/.test(String(s||'').trim()); }
  function isModel(s){ return /^\d{2,5}$/.test(String(s||'').trim()); }
  function isQty(s){ return /^\d{1,3}([.,]\d{3})*$/.test(String(s||'').trim()) || /^\d+$/.test(String(s||'').trim()); }

  function groupRows(items){
    const rows=[];
    items.forEach(it=>{
      const y = Math.round(it.y/2)*2;
      let row = rows.find(r => Math.abs(r.y-y) <= 3);
      if(!row){ row={y, items:[]}; rows.push(row); }
      row.items.push(it);
    });
    rows.sort((a,b)=>b.y-a.y);
    rows.forEach(r=>r.items.sort((a,b)=>a.x-b.x));
    return rows;
  }

  async function readPdf(file){
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    rawRows=[]; debugLines=[];
    for(let p=1;p<=pdf.numPages;p++){
      const page = await pdf.getPage(p);
      const text = await page.getTextContent();
      const items = text.items.map(it=>({ text:String(it.str||'').trim(), x:it.transform[4], y:it.transform[5], w:it.width||0 })).filter(it=>it.text);
      const rows = groupRows(items);
      parsePage(rows, p);
    }
    aggregate();
  }

  function parsePage(rows, pageNo){
    const pageText = rows.map(r=>r.items.map(i=>i.text).join(' ')).join(' ');
    const fullDates = pageText.match(/\b\d{2}\/\d{2}\/\d{4}\b/g) || [];
    if(fullDates.length && !detectedYear){ detectedYear = Number(fullDates[0].slice(-4)); }
    let header = null;
    for(const r of rows){
      const txt = r.items.map(i=>i.text).join(' ');
      if(/\bLinha\b/.test(txt) && /\bCliente\b/.test(txt) && r.items.some(i=>isModel(i.text))){ header = r; break; }
    }
    if(!header){ debugLines.push(`Página ${pageNo}: cabeçalho da grade de modelos não encontrado.`); return; }
    const cortHead = header.items.find(i=>/^Cort$/i.test(i.text));
    const clienteHead = header.items.find(i=>/^Cliente$/i.test(i.text));
    const linhaHead = header.items.find(i=>/^Linha$/i.test(i.text));
    const paresHead = header.items.find(i=>/^Pares$/i.test(i.text));
    const modelCols = header.items
      .filter(i => isModel(i.text) && i.x > (clienteHead ? clienteHead.x : 700))
      .map(i => ({ model:i.text, x:i.x }))
      .sort((a,b)=>a.x-b.x);
    debugLines.push(`Página ${pageNo}: ${modelCols.length} modelos no cabeçalho: ${modelCols.map(m=>m.model).join(', ')}`);
    if(!modelCols.length) return;

    const minY = header.y - 850;
    for(const r of rows){
      if(r.y >= header.y - 8 || r.y < minY) continue;
      const first = r.items[0]?.text || '';
      if(!isLine(first)) continue;
      const line = first;
      const cut = nearestText(r.items, cortHead ? cortHead.x : 330, isDate);
      const totalPares = nearestText(r.items, paresHead ? paresHead.x : 300, isQty);
      const adm = r.items.find(i => /\d{2}-\d{6,}/.test(i.text))?.text || '';
      const cliente = r.items.filter(i => i.x > 560 && i.x < (modelCols[0].x-10)).map(i=>i.text).join(' ').trim();
      modelCols.forEach((col, idx)=>{
        const nextX = modelCols[idx+1]?.x ?? col.x + 45;
        const prevX = modelCols[idx-1]?.x ?? col.x - 45;
        const left = (prevX + col.x)/2, right = (col.x + nextX)/2;
        const values = r.items.filter(i => i.x >= left && i.x < right && isQty(i.text)).map(i=>parseNumber(i.text));
        const paresModelo = values.reduce((a,b)=>a+b,0);
        if(paresModelo>0){ rawRows.push({page:pageNo,line,cut,model:col.model,pares:paresModelo,totalPares:parseNumber(totalPares),adm,cliente}); }
      });
    }
  }

  function nearestText(items, x, predicate){
    let best=null;
    items.forEach(i=>{ if(predicate(i.text)){ const d=Math.abs(i.x-x); if(!best || d<best.d) best={d, text:i.text}; } });
    return best ? best.text : '';
  }

  function aggregate(){
    const map = new Map();
    rawRows.forEach(r=>{
      const key = `${r.cut}|${r.line}|${r.model}`;
      if(!map.has(key)) map.set(key,{cut:r.cut,line:r.line,model:r.model,pares:0,atelier:''});
      map.get(key).pares += r.pares;
    });
    aggregated = [...map.values()].sort((a,b)=> (a.cut||'').localeCompare(b.cut||'') || a.line.localeCompare(b.line) || Number(a.model)-Number(b.model));
  }

  function applyFilters(rows){
    const fl = $('filterLinha').value.trim(); const fd = $('filterData').value.trim();
    return rows.filter(r => (!fl || r.line.includes(fl)) && (!fd || r.cut.includes(fd)));
  }

  function render(){
    const rows = applyFilters(aggregated);
    const raw = applyFilters(rawRows);
    resultPanel.style.display = rows.length ? 'block' : 'none';
    if(!rows.length){ setStatus('Nenhum dado encontrado. Confira se o PDF é o cronograma da Beira Rio e se os filtros estão vazios.'); return; }
    const totalPares = rows.reduce((s,r)=>s+r.pares,0);
    const linhas = [...new Set(rows.map(r=>r.line))]; const modelos = [...new Set(rows.map(r=>r.model))]; const cortes=[...new Set(rows.map(r=>r.cut))];
    summaryCards.innerHTML = `<div class="card"><strong>${fmt(totalPares)}</strong><span>Pares</span></div><div class="card"><strong>${linhas.length}</strong><span>Linhas</span></div><div class="card"><strong>${modelos.length}</strong><span>Modelos</span></div><div class="card"><strong>${cortes.join(', ')}</strong><span>Cortes</span></div>`;
    renderExcel(rows); renderRaw(raw); debugBox.textContent = debugLines.join('\n') + `\n\nRegistros lidos: ${rawRows.length}\nRegistros consolidados: ${aggregated.length}`;
    setStatus(`PDF lido com sucesso: ${fmt(totalPares)} pares encontrados em ${linhas.length} linha(s).`);
  }

  function renderExcel(rows){
    const byDate = groupBy(rows, r=>r.cut || 'Sem data');
    let html='';
    Object.keys(byDate).sort().forEach(date=>{
      const lines = groupBy(byDate[date], r=>r.line);
      Object.keys(lines).sort().forEach(line=>{
        const list = lines[line].sort((a,b)=>Number(a.model)-Number(b.model));
        const total = list.reduce((s,r)=>s+r.pares,0);
        const cardKey = `${date}|${line}`;
        html += `<div class="dist-card">
          <div class="dist-card-head">
            <div><h3>Linha ${line}</h3><small>Corte ${date} • Total ${fmt(total)} pares</small></div>
            <button type="button" class="copy-card-btn" data-card-key="${cardKey}">Copiar esta tabela</button>
          </div>
          <div class="dist-card-body">
            <table class="excel-table">
              <thead>
                <tr><th colspan="3" class="date-title">Corte ${date}</th></tr>
                <tr><th colspan="3" class="line-title">Linha ${line}</th></tr>
                <tr><th>Mod</th><th>Pares</th><th>Atelier</th></tr>
              </thead>
              <tbody>
                ${list.map(r=>`<tr><td>${r.model}</td><td>${fmt(r.pares)}</td><td><input data-key="${r.cut}|${r.line}|${r.model}" value="${r.atelier||''}" placeholder=""></td></tr>`).join('')}
                <tr class="total-row"><td>Total</td><td>${fmt(total)}</td><td></td></tr>
              </tbody>
            </table>
          </div>
        </div>`;
      });
    });
    excelTable.innerHTML = html;
    excelTable.querySelectorAll('input[data-key]').forEach(inp=>inp.addEventListener('input', e=>{ const row=aggregated.find(r=>`${r.cut}|${r.line}|${r.model}`===e.target.dataset.key); if(row) row.atelier=e.target.value; }));
    excelTable.querySelectorAll('.copy-card-btn').forEach(btn=>btn.addEventListener('click', async()=>{
      await navigator.clipboard.writeText(buildTSV(btn.dataset.cardKey));
      alert('Tabela deste card copiada! Agora é só colar no Excel.');
    }));
  }

  function renderRaw(rows){
    rawTable.innerHTML = '<thead><tr><th>Pág.</th><th>Linha</th><th>Corte</th><th>Modelo</th><th>Pares modelo</th><th>Adm-Rem</th><th>Cliente</th></tr></thead><tbody>' + rows.map(r=>`<tr><td>${r.page}</td><td>${r.line}</td><td>${r.cut}</td><td>${r.model}</td><td>${fmt(r.pares)}</td><td>${r.adm||''}</td><td>${r.cliente||''}</td></tr>`).join('') + '</tbody>';
  }

  function groupBy(arr, fn){ return arr.reduce((o,x)=>{ const k=fn(x); (o[k]||(o[k]=[])).push(x); return o; },{}); }

  function buildTSV(cardKey){
    const rows = applyFilters(aggregated);
    const selected = cardKey ? rows.filter(r => `${r.cut || 'Sem data'}|${r.line}` === cardKey) : rows;
    const byDate = groupBy(selected, r=>r.cut || 'Sem data');
    const out=[];
    Object.keys(byDate).sort().forEach(date=>{
      const lines=groupBy(byDate[date], r=>r.line);
      const lineKeys=Object.keys(lines).sort();
      if(cardKey){
        const line=lineKeys[0];
        out.push(['Corte', date]);
        out.push(['Linha', line]);
        out.push(['Mod','Pares','Atelier']);
        lines[line].sort((a,b)=>Number(a.model)-Number(b.model)).forEach(r=>out.push([r.model, r.pares, r.atelier||'']));
        out.push(['Total', lines[line].reduce((s,r)=>s+r.pares,0), '']);
      } else {
        out.push(['Data de Corte', date]);
        out.push(lineKeys.flatMap(l=>['Linha', l, '', '']));
        out.push(lineKeys.flatMap(()=>['Mod','Pares','Atelier','']));
        const maxLen=Math.max(...lineKeys.map(l=>lines[l].length));
        for(let i=0;i<maxLen;i++) out.push(lineKeys.flatMap(l=>{ const r=lines[l].sort((a,b)=>Number(a.model)-Number(b.model))[i]; return r ? [r.model, r.pares, r.atelier||'', ''] : ['', '', '', '']; }));
        out.push(lineKeys.flatMap(l=>['Total', lines[l].reduce((s,r)=>s+r.pares,0), '', ''])); out.push([]);
      }
    });
    return out.map(r=>r.join('\t')).join('\n');
  }


  function onlyVisibleRows(){
    return applyFilters(aggregated).filter(r=>r.cut && r.line && r.model && Number(r.pares)>0);
  }

  function getGroupedForExcel(){
    const rows = onlyVisibleRows();
    const grouped = [];
    const byDate = groupBy(rows, r=>r.cut || 'Sem data');
    Object.keys(byDate).sort().forEach(date=>{
      const byLine = groupBy(byDate[date], r=>r.line);
      Object.keys(byLine).sort().forEach(line=>{
        const itens = byLine[line].slice().sort((a,b)=>Number(a.model)-Number(b.model));
        grouped.push({date, line, itens});
      });
    });
    return grouped;
  }

  function parseCutDate(dateStr){
    const m = String(dateStr||'').match(/^(\d{2})\/(\d{2})$/);
    if(!m) return null;
    const year = detectedYear || new Date().getFullYear();
    return new Date(year, Number(m[2])-1, Number(m[1]));
  }

  function fileNameFromDate(dateStr){
    const m = String(dateStr||'').match(/^(\d{2})\/(\d{2})$/);
    return m ? `${m[1]}-${m[2]}.xlsx` : 'distribuicao.xlsx';
  }

  function clearTemplateInputCells(ws){
    const slots = getTemplateSlots();
    slots.forEach(slot=>{
      ws.getCell(slot.lineCell).value = null;
      for(let r=slot.start; r<=slot.end; r++){
        ws.getCell(`${slot.modCol}${r}`).value = null;
        ws.getCell(`${slot.paresCol}${r}`).value = null;
      }
    });
    // limpa somente a data digitada no topo; as datas calculadas por fórmula ficam intactas
    ws.getCell('G1').value = null;
  }

  function getTemplateSlots(){
    const groups = [
      {header:4, start:6, end:17},
      {header:20, start:22, end:33},
      {header:36, start:38, end:49}
    ];
    const cols = [
      ['B','C','C'], ['G','H','H'], ['L','M','M'], ['Q','R','R'], ['V','W','W'], ['AA','AB','AB']
    ];
    const slots=[];
    groups.forEach(g=>cols.forEach(c=>{
      slots.push({lineCell:`${c[2]}${g.header}`, modCol:c[0], paresCol:c[1], start:g.start, end:g.end});
    }));
    return slots;
  }

  function downloadBlob(blob, filename){
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 500);
  }

  async function gerarExcelAjustado(){
    try{
      if(!aggregated.length){ alert('Leia o PDF primeiro.'); return; }
      if(!excelFile.files[0]){ alert('Selecione o Excel modelo primeiro.'); return; }
      if(!window.ExcelJS){ alert('Biblioteca ExcelJS não carregou. Verifique a internet e tente novamente.'); return; }
      const groups = getGroupedForExcel();
      if(!groups.length){ alert('Nenhum dado para lançar no Excel.'); return; }
      const slots = getTemplateSlots();
      const tooManyGroups = groups.length > slots.length;
      const tooManyModels = groups.filter(g => g.itens.length > 12);
      if(tooManyGroups){ alert(`O Excel modelo possui ${slots.length} quadros. O PDF gerou ${groups.length}. Vou lançar somente os ${slots.length} primeiros para não alterar a estrutura.`); }
      if(tooManyModels.length){ alert('Alguma linha possui mais de 12 modelos. Para não alterar a tabela/fórmulas, serão lançados somente os 12 primeiros modelos em cada quadro.'); }

      setStatus('Gerando Excel ajustado...');
      const workbook = new ExcelJS.Workbook();
      await workbook.xlsx.load(await excelFile.files[0].arrayBuffer());
      const ws = workbook.getWorksheet('Distribuição') || workbook.worksheets[1] || workbook.worksheets[0];
      if(!ws) throw new Error('Aba Distribuição não encontrada no Excel.');

      clearTemplateInputCells(ws);
      const firstDate = groups[0].date;
      const d = parseCutDate(firstDate);
      ws.getCell('G1').value = d || firstDate;
      if(d) ws.getCell('G1').numFmt = 'dd/mmm';

      groups.slice(0, slots.length).forEach((group, idx)=>{
        const slot = slots[idx];
        ws.getCell(slot.lineCell).value = Number(group.line) || group.line;
        group.itens.slice(0, 12).forEach((item, i)=>{
          const row = slot.start + i;
          ws.getCell(`${slot.modCol}${row}`).value = Number(item.model) || item.model;
          ws.getCell(`${slot.paresCol}${row}`).value = Number(item.pares) || 0;
        });
      });

      if(workbook.calcProperties){ workbook.calcProperties.fullCalcOnLoad = true; workbook.calcProperties.forceFullCalc = true; }
      const buffer = await workbook.xlsx.writeBuffer();
      downloadBlob(new Blob([buffer], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}), fileNameFromDate(firstDate));
      setStatus(`Excel gerado: ${fileNameFromDate(firstDate)}. Foram lançados ${Math.min(groups.length, slots.length)} quadro(s).`);
    }catch(err){ console.error(err); setStatus('Erro ao gerar Excel: ' + (err.message || err)); }
  }

  processBtn.addEventListener('click', async()=>{
    try{
      if(!pdfFile.files[0]){ alert('Selecione o PDF primeiro.'); return; }
      setStatus('Lendo PDF... aguarde.'); processBtn.disabled=true; aggregated=[]; rawRows=[]; debugLines=[];
      await readPdf(pdfFile.files[0]); render();
    }catch(err){ console.error(err); setStatus('Erro ao ler PDF: ' + (err.message || err)); }
    finally{ processBtn.disabled=false; }
  });
  clearBtn.addEventListener('click',()=>{ pdfFile.value=''; excelFile.value=''; $('filterLinha').value=''; $('filterData').value=''; aggregated=[]; rawRows=[]; detectedYear=null; excelTable.innerHTML=''; rawTable.innerHTML=''; debugBox.textContent=''; resultPanel.style.display='none'; setStatus('',false); });
  $('filterLinha').addEventListener('input', render); $('filterData').addEventListener('input', render);
  $('copyExcelBtn').addEventListener('click', async()=>{ await navigator.clipboard.writeText(buildTSV()); alert('Tabela copiada! Agora é só colar no Excel.'); });
  $('generateExcelBtn').addEventListener('click', gerarExcelAjustado);
  $('downloadCsvBtn').addEventListener('click',()=>{ const blob=new Blob([buildTSV()],{type:'text/tab-separated-values;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='distribuicao_pdf.tsv'; a.click(); URL.revokeObjectURL(a.href); });
  document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); btn.classList.add('active'); $(btn.dataset.view).classList.add('active'); }));
})();
</script>
</body>
</html>
